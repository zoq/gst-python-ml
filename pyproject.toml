[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "gst-python-ml"
version = "0.3.0"
description = "Your project description"
readme = "README.md"
requires-python = "==3.13.*"
dependencies = [
    "pygobject",
    "torch==2.9.1",
    "torchvision==0.24.1",
    "torchaudio==2.9.1",
    "transformers==4.56.2",
    "qwen-vl-utils[decord]==0.0.8",
    "autoawq==0.2.9",
    "accelerate==1.12.0",
    "numpy",
    "huggingface-hub",
    "lap",
    "pycairo",
    "ultralytics",
    "bitsandbytes==0.46.1",
    "pytest>=7.0",
    "confluent_kafka",
    # flash-attn might need to be manually installed
    #"flash-attn",
    "diffusers",
    "sentencepiece",
    "protobuf",
    "pysilero",
    "faster_whisper",
    "pysilero-vad",
    "whisperspeech",
    "webdataset",
    "easydict",
    "pyflann-py3",
    "speechbrain"
]
